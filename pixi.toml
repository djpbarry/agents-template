[workspace]
authors = ["Dave Barry <david.barry@crick.ac.uk>"]
channels = ["conda-forge"]
name = "agents"
platforms = ["win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.6,<3.15"
pixi-pycharm = ">=0.0.11,<0.0.12"

[environments]
agents = ["default"]

[pypi-dependencies]
anthropic = ">=0.116.0, <0.117"
python-dotenv = ">=1.2.2, <2"
bioio = ">=3.4.0, <4"
bioio-tifffile = ">=1.3.0, <2"
numpy = ">=2.5.1, <3"
scipy = ">=1.18.0, <2"
scikit-image = ">=0.26.0, <0.27"
scikit-learn = ">=1.9.0, <2"
pandas = ">=3.0.3, <4"
matplotlib = ">=3.11.0, <4"
